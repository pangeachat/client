  <base href="$FLUTTER_BASE_HREF">

  <!-- #Pangea: one-time eviction of any legacy service worker.
       Current builds use --pwa-strategy=none and register no service worker.
       Returning users from older offline-first builds still have one registered
       that serves a stale app shell from Cache Storage. The old worker serves
       index.html online-first, so this runs on their next load, before the
       Flutter bootstrap: it unregisters all workers, clears all caches, and
       reloads once. Inert for fresh users (no registration -> no-op). -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var KEY = 'pangea-sw-killswitch';
      var reloadOnce = function () {
        try {
          if (sessionStorage.getItem(KEY)) return;
          sessionStorage.setItem(KEY, '1');
        } catch (e) {
          return; // can't guard against a reload loop -> leave it to a manual reload
        }
        location.reload();
      };
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        if (!regs.length) return;
        Promise.all(regs.map(function (r) { return r.unregister().catch(function () {}); }))
          .then(function () { return window.caches ? caches.keys() : []; })
          .then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          })
          .then(reloadOnce);
      }).catch(function () {});
      navigator.serviceWorker.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'SW_SELF_DESTRUCT_RELOAD') reloadOnce();
      });
    })();
  </script>

  <script>
    window.__BUILD_VERSION__ = "__BUILD_VERSION__";

    (function () {
      const BUILD = window.__BUILD_VERSION__ || "dev";

      const shouldVersion = (url) => {
        return (
          url.includes("FontManifest.json") ||
          url.includes("AssetManifest.json") ||
          url.includes("assets.json") ||
          url.includes("version.json")
        );
      };

      const addVersion = (url) => {
        if (!shouldVersion(url)) return url;

        const separator = url.includes("?") ? "&" : "?";
        return url + separator + "v=" + BUILD;
      };

      const originalFetch = window.fetch.bind(window);

      window.fetch = function (input, init) {
        try {
          if (typeof input === "string") {
            input = addVersion(input);
          } else if (input instanceof Request) {
            input = new Request(addVersion(input.url), input);
          }
        } catch (e) { }

        return originalFetch(input, init);
      };
    })();
  </script>

  <!-- #Pangea -->
  <script>
    (function() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isAndroid = /android/i.test(userAgent);
      const isIOS = /iPhone|iPad|iPod/i.test(userAgent);
      const isMobile = isAndroid || isIOS;

      if (!isMobile) return; // Exit if not a mobile device

      const appScheme = 'pangea://'; // Replace with your app's scheme
      const fallbackURL = isIOS
        ? 'https://apps.apple.com/app/pangea-chat/id1445118630'
        : 'https://play.google.com/store/apps/details?id=com.talktolearn.chat';

      // Try opening the app
      window.location = appScheme;

      // Fallback to App Store / Play Store if not installed
      setTimeout(() => {
        window.location = fallbackURL;
      }, 1500);
    })();
  </script>
