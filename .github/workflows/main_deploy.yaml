name: Main Deploy Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEB_APP_ENV: ${{ vars.WEB_APP_ENV }}
  ENV_OVERRIDES: ${{ vars.ENV_OVERRIDES }}

permissions:
  contents: read

jobs:
  build_web:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1
      - run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - name: Prepare web
        run: ./scripts/prepare-web.sh
      - run: rm ./assets/vodozemac/.gitignore
      - run: flutter pub get
      - name: Build Release Web
        run: |
          flutter config --enable-web
          flutter clean
          flutter pub get
          flutter build web --dart-define=FLUTTER_WEB_CANVASKIT_URL=canvaskit/ --pwa-strategy=none --profile --source-maps

      - name: Version Material Icons font
        run: |
          VERSION=${GITHUB_SHA::8}

          FONT_DIR="build/web/assets/fonts"
          OLD_NAME="MaterialIcons-Regular.otf"
          NEW_NAME="MaterialIcons-Regular-${VERSION}.otf"

          mv "$FONT_DIR/$OLD_NAME" "$FONT_DIR/$NEW_NAME"

          sed -i "s|$OLD_NAME|$NEW_NAME|g" build/web/assets/FontManifest.json

          echo "Renamed $OLD_NAME -> $NEW_NAME"

      - name: Inject build version into index.html
        run: |
          VERSION=${GITHUB_SHA::8}
          sed -i "s|__BUILD_VERSION__|$VERSION|g" build/web/index.html
        
      - name: Upload files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web
          path: build/web

  deploy_web:
    runs-on: ubuntu-latest
    needs: build_web
    environment: staging
    permissions:
      contents: read
      id-token: write
    env:
      WEBAPP_S3_BUCKET: ${{ vars.WEBAPP_S3_BUCKET }}
      CF_DISTRIBUTION_ID: ${{ vars.CF_DISTRIBUTION_ID }}
    steps:
      - name: Download web
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web
          path: build/web
      - name: Update Website files
        run: |
          touch build/web/.env
          echo "$WEB_APP_ENV" >> build/web/.env
          cp build/web/.env build/web/assets/.env
          touch build/web/assets/envs.json
          echo "$ENV_OVERRIDES" >> build/web/assets/envs.json
          mkdir -p build/web/.well-known
          curl https://app.pangea.chat/.well-known/apple-app-site-association \
            -o build/web/.well-known/apple-app-site-association
          curl https://app.pangea.chat/.well-known/assetlinks.json \
            -o build/web/.well-known/assetlinks.json
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: us-east-1
      - name: Deploy to S3
        run: |
          set -e

          # =========================
          # 1. IMMUTABLE ASSETS (safe hashed outputs only)
          # =========================
          aws s3 sync ./build/web s3://$WEBAPP_S3_BUCKET \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "main.dart.js" \
            --exclude "flutter.js" \
            --exclude "flutter_bootstrap.js" \
            --exclude "flutter_service_worker.js" \
            --exclude "version.json" \
            --exclude "manifest.json" \
            --exclude "assets/FontManifest.json" \
            --exclude "assets/assets.json" \
            --exclude "assets/fonts/*"

          # =========================
          # 2. FONT FILES (stable filenames but frequently updated)
          # =========================
          aws s3 sync ./build/web/assets/fonts s3://$WEBAPP_S3_BUCKET/assets/fonts \
            --cache-control "no-cache, must-revalidate"

          # =========================
          # 3. FLUTTER RUNTIME ENTRY FILES (MUST NEVER BE CACHED LONG-TERM)
          # =========================
          RUNTIME_FILES=(
            "index.html"
            "main.dart.js"
            "flutter.js"
            "flutter_bootstrap.js"
            "flutter_service_worker.js"
            "version.json"
            "manifest.json"
            "assets/FontManifest.json"
            "assets/assets.json"
          )

          for f in "${RUNTIME_FILES[@]}"; do
            if [ -f "./build/web/$f" ]; then
              aws s3 cp "./build/web/$f" \
                "s3://$WEBAPP_S3_BUCKET/$f" \
                --cache-control "no-cache, must-revalidate"
            fi
          done
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/*"

  update_sentry:
    runs-on: ubuntu-latest
    needs: build_web
    environment: staging
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_PROJECT: client
      SENTRY_ORG: pangea-chat
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Download web
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web
          path: build/web
      - name: Update packages
        run: flutter pub get
      - name: Update sentry
        run: flutter packages pub run sentry_dart_plugin
