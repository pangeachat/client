name: Add needs testing labels
on:
  issues:
    types:
      - closed
jobs:
  label_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add testing labels (unless opted out)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          STATE_REASON: ${{ github.event.issue.state_reason }}
        run: |
          if [ "$STATE_REASON" = "not_planned" ]; then
            echo "Issue was closed as not planned - skipping labels."
            exit 0
          fi

          DUPLICATE_EVENT_COUNT=$(gh api "repos/$GH_REPO/issues/$NUMBER/events" --paginate --jq '[ .[] | select(.event == "marked_as_duplicate") ] | length')
          if [ "${DUPLICATE_EVENT_COUNT:-0}" -gt 0 ]; then
            echo "Issue was closed as duplicate - skipping labels."
            exit 0
          fi

          BODY=$(gh issue view "$NUMBER" --json body -q .body)
          if echo "$BODY" | grep -qi "no client testing needed"; then
            echo "Issue opts out of client testing — skipping label."
            exit 0
          fi
          gh issue edit "$NUMBER" --add-label "needs iOS testing"
          gh issue edit "$NUMBER" --add-label "needs android testing"
          gh issue edit "$NUMBER" --add-label "needs web testing"
          gh issue edit "$NUMBER" --add-label "needs iPad testing"
