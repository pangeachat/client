name: Pull Request Workflow

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  code_tests:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: ./scripts/generate-locale-config.sh
      - run: git diff --exit-code
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - name: Ensure .fvmrc and CI Flutter version agree
        # The FVM pin (.fvmrc) is what developers' local toolchains use, and
        # FLUTTER_VERSION (versions.env) is what CI uses. They must be the same
        # version, otherwise the dart-format gate goes red on unrelated files.
        run: |
          FVMRC_VERSION=$(grep -oP '"flutter"\s*:\s*"\K[^"]+' .fvmrc)
          if [ "$FVMRC_VERSION" != "$FLUTTER_VERSION" ]; then
            echo "::error::.fvmrc pins Flutter '$FVMRC_VERSION' but versions.env pins '$FLUTTER_VERSION'. Update both to the same version."
            exit 1
          fi
          echo "Flutter version pin is consistent across .fvmrc and CI: $FLUTTER_VERSION"
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Check formatting
        run: dart format lib/ test/ --set-exit-if-changed
      - name: Check import formatting
        run: dart run import_sorter:main --no-comments --exit-if-changed
      - name: Check license compliance
        run: dart run license_checker check-licenses -c licenses.yaml --problematic
      - run: flutter analyze
      - name: Add Firebase Messaging
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICES_PLIST: ${{ secrets.GOOGLE_SERVICES_PLIST }}
        run: ./scripts/configure-firebase-messaging.sh
      - run: flutter analyze
      - run: flutter test --dart-define=TEST_MATRIX_USERNAME=${{ vars.TEST_MATRIX_USERNAME }} --dart-define=TEST_MATRIX_PASSWORD=${{ vars.TEST_MATRIX_PASSWORD }}


  # Source-level accessibility gate: every interactive control and image in lib/
  # must carry an accessible name (tooltip / semanticLabel) or be explicitly
  # marked decorative (excludeFromSemantics). Catches naming gaps anywhere in the
  # codebase, not only on the surfaces axe-core renders. Pure Python, no Flutter.
  accessibility_floor_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Accessible names floor-check
        run: python3 scripts/a11y_floor_check.py

  build_debug_apk:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "zulu"
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: ./.github/actions/free_up_space
      - uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1
      - name: Add Firebase Messaging
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: ./scripts/configure-firebase-messaging.sh
      - run: flutter build apk --debug --target-platform android-arm # Pangea change, only build arm to decrease size & time

  build_debug_web:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1
      - run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
      - run: flutter pub get
      - name: Prepare web
        run: ./scripts/prepare-web.sh
      - run: flutter build web

